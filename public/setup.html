<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kurulum - Supplier Hub</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    background:#0b0b0d; color:#e7e7ea;
    display:grid; place-items:center; padding:32px;
  }
  .card {
    width:100%; max-width:560px; background:#16161a; border:1px solid #2a2a31;
    border-radius:14px; padding:32px; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:#8e8e96; font-size:13px; margin-bottom:24px; line-height:1.5; }
  .step { font-size:11px; color:#6c5ce7; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
  label { display:block; font-size:12px; color:#b0b0b8; margin:18px 0 6px; text-transform:uppercase; letter-spacing:.04em; }
  label .hint { display:block; text-transform:none; color:#6e6e76; font-size:11px; margin-top:2px; }
  label .hint a { color:#8aa9ff; }
  input, select {
    width:100%; padding:11px 13px; border-radius:8px; border:1px solid #2a2a31;
    background:#0b0b0d; color:#e7e7ea; font-size:13px; font-family:ui-monospace,SFMono-Regular,monospace;
  }
  input:focus, select:focus { outline:none; border-color:#6c5ce7; }
  button {
    width:100%; margin-top:24px; padding:12px; border-radius:8px; border:none;
    background:#6c5ce7; color:white; font-size:14px; font-weight:600; cursor:pointer;
  }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .msg { margin-top:16px; padding:12px 14px; border-radius:8px; font-size:13px; line-height:1.5; }
  .msg.err { background:#2a1417; border:1px solid #5a1f26; color:#ff8a8a; }
  .msg.ok  { background:#14271b; border:1px solid #1f5a2a; color:#8aff9a; }
  .meta { margin-top:24px; padding-top:16px; border-top:1px solid #2a2a31; font-size:11px; color:#6e6e76; line-height:1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="step">Adim 2 / 2 - Kurulum</div>
  <h1>Supplier Hub Konfigurasyon</h1>
  <div class="sub">
    Supplier Hub Easyship API uzerinden Etsy magaza siparislerini toplar.
    Asagidaki bilgileri doldur. Sonradan ayarlar sayfasindan degistirebilirsin.
  </div>

  <form id="form" autocomplete="off">
    <label>
      Veri Kaynagi
      <span class="hint">mock = test verisi (baslangic), easyship = canli Etsy entegrasyonu</span>
    </label>
    <select id="dataSource">
      <option value="mock">mock (test)</option>
      <option value="easyship">easyship</option>
      <option value="navlungo">navlungo</option>
      <option value="shipentegra">shipentegra</option>
      <option value="email">email</option>
    </select>

    <label>
      Easyship API Token
      <span class="hint">
        Sadece easyship secersen gerekli.
        <a href="https://app.easyship.com/connect/api-integration" target="_blank">app.easyship.com/connect/api-integration</a>
      </span>
    </label>
    <input id="easyship" type="text" placeholder="prod_..." autocapitalize="off" autocorrect="off" spellcheck="false">

    <label>
      Session Secret
      <span class="hint">Cookie imzalama anahtari. Otomatik olusturulur, degistirme.</span>
    </label>
    <input id="session" type="text" readonly>

    <button type="submit" id="submit">Kaydet ve Devam Et</button>
  </form>

  <div id="msg"></div>

  <div class="meta">
    Tum ayarlar <code style="color:#b0b0b8">.env</code> dosyasina yazilir.
    Internete veya flowiqa.com'a GONDERILMEZ.
  </div>
</div>

<script>
const form = document.getElementById('form');
const submit = document.getElementById('submit');
const msg = document.getElementById('msg');
const sessionInput = document.getElementById('session');

const errMap = {
  invalid_data_source: 'Gecersiz veri kaynagi.',
  missing_easyship_token: 'Easyship secildi ama token bos.',
  invalid_session_secret: 'Session secret olusturulamadi.',
  setup_failed: 'Kayit basarisiz. Tekrar dene.',
};

// Generate session secret (64 hex chars)
function genSecret() {
  const bytes = new Uint8Array(32);
  crypto.getRandomValues(bytes);
  return Array.from(bytes, b => b.toString(16).padStart(2, '0')).join('');
}
sessionInput.value = genSecret();

function show(kind, text) {
  msg.className = 'msg ' + kind;
  msg.textContent = text;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submit.disabled = true;
  msg.textContent = '';

  const dataSource = document.getElementById('dataSource').value;
  const easyship = document.getElementById('easyship').value.trim();
  const session = sessionInput.value.trim();

  if (dataSource === 'easyship' && !easyship) {
    show('err', errMap.missing_easyship_token);
    submit.disabled = false;
    return;
  }
  if (session.length < 32) {
    show('err', errMap.invalid_session_secret);
    submit.disabled = false;
    return;
  }

  try {
    const r = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataSource, easyship, session }),
    });
    const j = await r.json();
    if (r.ok) {
      show('ok', 'Kayit basarili. Sunucu yeniden baslatiliyor...');
      setTimeout(() => location.href = '/', 2000);
    } else {
      show('err', errMap[j.error] || ('Hata: ' + (j.error || r.status)));
      submit.disabled = false;
    }
  } catch (err) {
    show('err', 'Baglanti hatasi: ' + err.message);
    submit.disabled = false;
  }
});
</script>
</body>
</html>
